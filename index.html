<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쿠팡픽 - 쿠팡 상품 리뷰</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Noto Sans KR',sans-serif;background:#f9f9f9;color:#1a1a1a}
    header{background:#fff;border-bottom:1px solid #e8e8e8;padding:0 24px;position:sticky;top:0;z-index:99}
    .hd{max-width:760px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:60px}
    .logo{font-size:1.5rem;font-weight:900;color:#e53935;text-decoration:none;letter-spacing:-0.5px}
    .logo-desc{font-size:0.72rem;color:#aaa;font-weight:400;margin-left:6px}
    .hd-right{font-size:0.78rem;color:#aaa}
    .blog-info{background:#fff;border-bottom:1px solid #eee;padding:40px 24px 32px;text-align:center}
    .blog-info-inner{max-width:760px;margin:0 auto}
    .blog-info h1{font-size:1.7rem;font-weight:900;line-height:1.4;margin-bottom:10px}
    .blog-info h1 em{color:#e53935;font-style:normal}
    .blog-info p{font-size:0.88rem;color:#777;line-height:1.8}
    .divider{width:36px;height:3px;background:#e53935;margin:16px auto;border-radius:2px}
    .main{max-width:760px;margin:0 auto;padding:32px 24px 80px}
    .section-label{font-size:0.72rem;font-weight:700;color:#e53935;letter-spacing:1px;margin-bottom:20px;padding-bottom:10px;border-bottom:1px solid #f0f0f0}
    .post-card{display:grid;grid-template-columns:1fr 200px;gap:0;background:#fff;border-radius:12px;overflow:hidden;margin-bottom:16px;border:1px solid #f0f0f0;text-decoration:none;color:inherit;transition:box-shadow 0.2s,transform 0.2s}
    .post-card:hover{box-shadow:0 4px 16px rgba(0,0,0,0.10);transform:translateY(-2px)}
    .pc-body{padding:20px 22px;display:flex;flex-direction:column;justify-content:center}
    .pc-date{font-size:0.72rem;color:#bbb;margin-bottom:7px}
    .pc-title{font-size:1rem;font-weight:700;line-height:1.5;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .pc-summary{font-size:0.82rem;color:#888;line-height:1.65;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:12px}
    .pc-more{font-size:0.78rem;font-weight:700;color:#e53935}
    .pc-img{width:200px;height:150px;object-fit:cover;display:block;background:#f5f5f5}
    .pc-img-ph{width:200px;height:150px;background:linear-gradient(135deg,#fce4ec,#f8bbd0);display:flex;align-items:center;justify-content:center;font-size:2.5rem;flex-shrink:0}
    .empty{text-align:center;padding:60px 20px;color:#ccc;font-size:0.88rem}
    .notice{font-size:0.72rem;color:#bbb;text-align:center;margin-top:16px;line-height:1.9}
    footer{background:#1a1a1a;color:#555;text-align:center;padding:24px;font-size:0.78rem;margin-top:40px}
    footer strong{color:#fff}
    @media(max-width:560px){
      .post-card{grid-template-columns:1fr}
      .pc-img,.pc-img-ph{width:100%;height:180px}
      .blog-info h1{font-size:1.3rem}
    }
  </style>
</head>
<body>
<header>
  <div class="hd">
    <a href="/" class="logo">쿠팡픽<span class="logo-desc">쿠팡 파트너스 리뷰 블로그</span></a>
    <span class="hd-right" id="postCount"></span>
  </div>
</header>
<div class="blog-info">
  <div class="blog-info-inner">
    <h1>직접 써보고 고른<br><em>진짜 쿠팡 추천 상품</em></h1>
    <div class="divider"></div>
    <p>광고 없이, 직접 사용해보고 솔직하게 작성한 리뷰만 올립니다.<br>쿠팡 최저가 링크와 함께 정보를 제공합니다.</p>
  </div>
</div>
<div class="main">
  <div class="section-label">최신 리뷰</div>
  <div id="postList"><div class="empty">불러오는 중...</div></div>
  <div class="notice">이 포스팅은 쿠팡 파트너스 활동의 일환으로, 이에 따른 일정액의 수수료를 제공받습니다. 구매자에게 추가 비용이 발생하지 않습니다.</div>
</div>
<footer>
  <strong>쿠팡픽</strong> &nbsp;·&nbsp; 쿠팡 파트너스 제휴 블로그 &nbsp;·&nbsp; © 2026
</footer>
<script>
async function load(){
  try{
    const posts=await(await fetch('posts.json?t='+Date.now())).json();
    document.getElementById('postCount').textContent='총 '+posts.length+'편';
    const el=document.getElementById('postList');
    if(!posts.length){el.innerHTML='<div class="empty">아직 게시물이 없습니다.</div>';return}
    el.innerHTML=posts.filter(p=>p.title&&p.title!=='undefined').map(p=>`
      <a href="${p.url}" class="post-card">
        <div class="pc-body">
          <div class="pc-date">${p.date||''}</div>
          <div class="pc-title">${p.title}</div>
          <div class="pc-summary">${p.summary||''}</div>
          <span class="pc-more">리뷰 보기 →</span>
        </div>
        ${p.image?`<img class="pc-img" src="${p.image}" alt="${p.title}">`:`<div class="pc-img-ph">🛍️</div>`}
      </a>`).join('');
  }catch(e){
    document.getElementById('postList').innerHTML='<div class="empty">게시물을 불러올 수 없습니다.</div>';
  }
}
load();
</script>
</body>
</html>
