<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쿠팡픽 - 진짜 써본 사람들의 리뷰</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    :root {
      --red: #e53935; --red-dark: #b71c1c; --yellow: #ffd600;
      --bg: #f7f7f7; --white: #ffffff; --gray: #9e9e9e; --dark: #1a1a1a;
      --card-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--dark); }
    header { background: var(--white); border-bottom: 3px solid var(--red); padding: 0 24px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .header-inner { max-width: 780px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 64px; }
    .logo { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: var(--dark); letter-spacing: 2px; text-decoration: none; }
    .logo span { color: var(--red); }
    .header-sub { font-size: 0.78rem; color: var(--gray); }
    .blog-top { background: var(--white); border-bottom: 1px solid #eee; padding: 40px 24px 32px; text-align: center; }
    .blog-top-inner { max-width: 780px; margin: 0 auto; }
    .blog-top h1 { font-size: 2rem; font-weight: 900; margin-bottom: 8px; }
    .blog-top h1 span { color: var(--red); }
    .blog-top-divider { width: 40px; height: 3px; background: var(--red); margin: 16px auto; border-radius: 2px; }
    .blog-top p { font-size: 0.92rem; color: #666; line-height: 1.7; }
    .main { max-width: 780px; margin: 0 auto; padding: 36px 24px 60px; }
    .post-item { background: var(--white); border-radius: 14px; overflow: hidden; box-shadow: var(--card-shadow); margin-bottom: 24px; display: grid; grid-template-columns: 260px 1fr; text-decoration: none; color: inherit; transition: transform 0.2s, box-shadow 0.2s; }
    .post-item:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
    .post-item-img { width: 260px; height: 180px; object-fit: cover; display: block; background: #f0f0f0; }
    .post-item-placeholder { width: 260px; height: 180px; background: linear-gradient(135deg, #fce4ec, #ffccbc); display: flex; align-items: center; justify-content: center; font-size: 3rem; flex-shrink: 0; }
    .post-item-body { padding: 22px 24px; display: flex; flex-direction: column; justify-content: center; }
    .post-item-date { font-size: 0.75rem; color: var(--gray); margin-bottom: 8px; }
    .post-item-title { font-size: 1.05rem; font-weight: 700; line-height: 1.5; margin-bottom: 10px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .post-item-summary { font-size: 0.85rem; color: #666; line-height: 1.65; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 14px; }
    .post-item-footer { display: flex; align-items: center; justify-content: space-between; }
    .post-item-tags { display: flex; gap: 6px; flex-wrap: wrap; }
    .tag { font-size: 0.7rem; font-weight: 600; padding: 2px 8px; border-radius: 10px; background: #fce4ec; color: var(--red); }
    .read-more { font-size: 0.82rem; font-weight: 700; color: var(--red); white-space: nowrap; }
    .loading { text-align: center; padding: 60px; color: var(--gray); font-size: 0.9rem; }
    .disclaimer { background: #fff8e1; border: 1px solid #ffe082; border-radius: 8px; padding: 12px 16px; font-size: 0.78rem; color: #795548; margin-top: 8px; text-align: center; }
    footer { background: var(--dark); color: rgba(255,255,255,0.6); text-align: center; padding: 28px 24px; font-size: 0.8rem; }
    footer strong { color: white; }
    @media (max-width: 640px) {
      .post-item { grid-template-columns: 1fr; }
      .post-item-img, .post-item-placeholder { width: 100%; height: 200px; }
      .blog-top h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
<header>
  <div class="header-inner">
    <a href="/" class="logo">쿠팡<span>픽</span></a>
    <span class="header-sub">쿠팡 파트너스 제휴 블로그</span>
  </div>
</header>
<div class="blog-top">
  <div class="blog-top-inner">
    <h1>진짜 써본 사람들의<br><span>쿠팡 상품 리뷰</span></h1>
    <div class="blog-top-divider"></div>
    <p>직접 구매하고 사용해본 제품들을 솔직하게 소개합니다.<br>좋은 것만, 검증된 것만 올립니다.</p>
  </div>
</div>
<div class="main">
  <div id="postList"><div class="loading">리뷰를 불러오는 중...</div></div>
  <div class="disclaimer">⚠️ 이 포스팅은 쿠팡 파트너스 활동의 일환으로, 이에 따른 일정액의 수수료를 제공받습니다.</div>
</div>
<footer>
  <strong>쿠팡픽</strong> · 진짜 써본 사람들의 솔직한 리뷰<br>
  <span style="margin-top:6px;display:block;">© 2026 쿠팡픽. 쿠팡 파트너스 제휴 블로그.</span>
</footer>
<script>
async function loadPosts() {
  try {
    const res = await fetch('posts.json');
    const posts = await res.json();
    renderPosts(posts);
  } catch(e) {
    document.getElementById('postList').innerHTML = '<div class="loading">게시물이 없습니다.</div>';
  }
}
function renderPosts(posts) {
  const list = document.getElementById('postList');
  if (!posts.length) { list.innerHTML = '<div class="loading">게시물이 없습니다.</div>'; return; }
  list.innerHTML = posts.map(p => `
    <a href="${p.url}" class="post-item">
      ${p.image ? `<img class="post-item-img" src="${p.image}" alt="${p.title}">` : `<div class="post-item-placeholder">🛒</div>`}
      <div class="post-item-body">
        <div class="post-item-date">${p.date || ''}</div>
        <div class="post-item-title">${p.title}</div>
        <div class="post-item-summary">${p.summary || ''}</div>
        <div class="post-item-footer">
          <div class="post-item-tags">${(p.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('')}</div>
          <span class="read-more">리뷰 보기 →</span>
        </div>
      </div>
    </a>
  `).join('');
}
loadPosts();
</script>
</body>
</html>
