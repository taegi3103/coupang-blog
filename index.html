<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쿠팡픽 - 진짜 써본 사람들의 리뷰</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    :root {
      --red: #e53935;
      --red-dark: #b71c1c;
      --orange: #ff6f00;
      --yellow: #ffd600;
      --bg: #f5f5f5;
      --white: #ffffff;
      --gray: #9e9e9e;
      --dark: #1a1a1a;
      --card-shadow: 0 2px 12px rgba(0,0,0,0.10);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--dark);
    }

    /* HEADER */
    header {
      background: var(--red);
      padding: 0 24px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(229,57,53,0.3);
    }
    .header-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
    }
    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      color: var(--white);
      letter-spacing: 2px;
      text-decoration: none;
    }
    .logo span {
      color: var(--yellow);
    }
    nav a {
      color: rgba(255,255,255,0.85);
      text-decoration: none;
      margin-left: 20px;
      font-size: 0.9rem;
      font-weight: 500;
      transition: color 0.2s;
    }
    nav a:hover { color: var(--yellow); }

    /* HERO BANNER */
    .hero {
      background: linear-gradient(135deg, #b71c1c 0%, #e53935 50%, #ff6f00 100%);
      color: white;
      padding: 52px 24px 44px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: -60px; right: -60px;
      width: 300px; height: 300px;
      background: rgba(255,255,255,0.05);
      border-radius: 50%;
    }
    .hero::after {
      content: '';
      position: absolute;
      bottom: -80px; left: -40px;
      width: 220px; height: 220px;
      background: rgba(255,255,255,0.05);
      border-radius: 50%;
    }
    .hero-badge {
      display: inline-block;
      background: var(--yellow);
      color: var(--dark);
      font-size: 0.75rem;
      font-weight: 700;
      padding: 4px 14px;
      border-radius: 20px;
      margin-bottom: 16px;
      letter-spacing: 1px;
    }
    .hero h1 {
      font-size: 2.2rem;
      font-weight: 900;
      line-height: 1.25;
      margin-bottom: 10px;
    }
    .hero p {
      font-size: 1rem;
      opacity: 0.85;
      margin-bottom: 28px;
    }
    .hero-stats {
      display: flex;
      justify-content: center;
      gap: 32px;
    }
    .stat {
      text-align: center;
    }
    .stat-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      color: var(--yellow);
      line-height: 1;
    }
    .stat-label {
      font-size: 0.75rem;
      opacity: 0.8;
      margin-top: 2px;
    }

    /* CATEGORY TABS */
    .category-bar {
      background: var(--white);
      border-bottom: 1px solid #e0e0e0;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .category-bar::-webkit-scrollbar { display: none; }
    .category-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      padding: 0 24px;
    }
    .cat-btn {
      padding: 14px 20px;
      background: none;
      border: none;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--gray);
      cursor: pointer;
      white-space: nowrap;
      border-bottom: 3px solid transparent;
      transition: all 0.2s;
    }
    .cat-btn.active, .cat-btn:hover {
      color: var(--red);
      border-bottom-color: var(--red);
    }

    /* MAIN LAYOUT */
    .main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 24px;
    }

    /* FEATURED POST */
    .section-title {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-title::before {
      content: '';
      width: 4px;
      height: 20px;
      background: var(--red);
      border-radius: 2px;
    }

    .featured {
      background: var(--white);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: var(--card-shadow);
      margin-bottom: 32px;
      display: grid;
      grid-template-columns: 1fr 1fr;
    }
    .featured-img {
      background: #eee;
      min-height: 280px;
      overflow: hidden;
    }
    .featured-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .featured-content {
      padding: 32px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .post-badge {
      display: inline-block;
      background: #fff3e0;
      color: var(--orange);
      font-size: 0.72rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      margin-bottom: 12px;
    }
    .featured-content h2 {
      font-size: 1.4rem;
      font-weight: 900;
      line-height: 1.4;
      margin-bottom: 12px;
      color: var(--dark);
    }
    .featured-content p {
      font-size: 0.9rem;
      color: #555;
      line-height: 1.7;
      margin-bottom: 20px;
    }
    .coupang-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--red);
      color: white;
      text-decoration: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 0.95rem;
      transition: background 0.2s, transform 0.1s;
      width: fit-content;
    }
    .coupang-btn:hover {
      background: var(--red-dark);
      transform: translateY(-1px);
    }
    .coupang-btn svg {
      width: 18px; height: 18px;
    }

    /* POST GRID */
    .posts-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 32px;
    }
    .post-card {
      background: var(--white);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: var(--card-shadow);
      transition: transform 0.2s, box-shadow 0.2s;
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .post-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.13);
    }
    .card-img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      background: #eee;
      display: block;
    }
    .card-img-placeholder {
      width: 100%;
      height: 180px;
      background: linear-gradient(135deg, #fce4ec, #ffccbc);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
    }
    .card-body {
      padding: 16px;
    }
    .card-tags {
      display: flex;
      gap: 6px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .tag {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 10px;
      background: #fce4ec;
      color: var(--red);
    }
    .card-body h3 {
      font-size: 0.95rem;
      font-weight: 700;
      line-height: 1.45;
      margin-bottom: 8px;
      color: var(--dark);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-body p {
      font-size: 0.82rem;
      color: #777;
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 12px;
    }
    .card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.75rem;
      color: var(--gray);
    }
    .read-more {
      color: var(--red);
      font-weight: 600;
      font-size: 0.8rem;
    }

    /* DISCLAIMER */
    .disclaimer {
      background: #fff8e1;
      border: 1px solid #ffe082;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 0.78rem;
      color: #795548;
      margin-top: 16px;
      text-align: center;
    }

    /* FOOTER */
    footer {
      background: var(--dark);
      color: rgba(255,255,255,0.6);
      text-align: center;
      padding: 28px 24px;
      font-size: 0.8rem;
      margin-top: 40px;
    }
    footer strong { color: white; }

    /* LOADING */
    .loading {
      text-align: center;
      padding: 60px;
      color: var(--gray);
      font-size: 0.9rem;
    }

    @media (max-width: 768px) {
      .featured { grid-template-columns: 1fr; }
      .featured-img { min-height: 200px; }
      .posts-grid { grid-template-columns: repeat(2, 1fr); }
      .hero h1 { font-size: 1.6rem; }
      nav { display: none; }
    }
    @media (max-width: 480px) {
      .posts-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="/" class="logo">쿠팡<span>픽</span></a>
    <nav>
      <a href="#">홈</a>
      <a href="#">인기상품</a>
      <a href="#">카테고리</a>
    </nav>
  </div>
</header>

<div class="hero">
  <div class="hero-badge">✨ 진짜 후기만 모았어요</div>
  <h1>써봐야 아는<br>쿠팡 인기 상품 리뷰</h1>
  <p>직접 사용해보고 엄선한 제품들을 소개합니다</p>
  <div class="hero-stats">
    <div class="stat">
      <div class="stat-num" id="postCount">0</div>
      <div class="stat-label">리뷰 게시물</div>
    </div>
    <div class="stat">
      <div class="stat-num">100%</div>
      <div class="stat-label">솔직한 후기</div>
    </div>
    <div class="stat">
      <div class="stat-num">매일</div>
      <div class="stat-label">새 리뷰 업데이트</div>
    </div>
  </div>
</div>

<div class="category-bar">
  <div class="category-inner">
    <button class="cat-btn active" onclick="filterCategory('전체')">전체</button>
    <button class="cat-btn" onclick="filterCategory('가전')">가전·디지털</button>
    <button class="cat-btn" onclick="filterCategory('생활')">생활·주방</button>
    <button class="cat-btn" onclick="filterCategory('패션')">패션·뷰티</button>
    <button class="cat-btn" onclick="filterCategory('식품')">식품·건강</button>
    <button class="cat-btn" onclick="filterCategory('유아')">유아·완구</button>
    <button class="cat-btn" onclick="filterCategory('스포츠')">스포츠·레저</button>
  </div>
</div>

<div class="main">
  <div id="featuredSection"></div>

  <div class="section-title">최신 리뷰</div>
  <div class="posts-grid" id="postsGrid">
    <div class="loading">리뷰를 불러오는 중...</div>
  </div>

  <div class="disclaimer">
    ⚠️ 이 포스팅은 쿠팡 파트너스 활동의 일환으로, 이에 따른 일정액의 수수료를 제공받습니다.
  </div>
</div>

<footer>
  <strong>쿠팡픽</strong> · 진짜 써본 사람들의 솔직한 리뷰<br>
  <span style="margin-top:6px;display:block;">© 2026 쿠팡픽. 쿠팡 파트너스 제휴 블로그.</span>
</footer>

<script>
let allPosts = [];
let currentCategory = '전체';

async function loadPosts() {
  try {
    const res = await fetch('posts.json');
    allPosts = await res.json();
    document.getElementById('postCount').textContent = allPosts.length;
    renderPosts(allPosts);
  } catch(e) {
    document.getElementById('postsGrid').innerHTML = '<div class="loading">게시물이 없습니다.</div>';
  }
}

function renderPosts(posts) {
  // Featured (최신글)
  const featuredEl = document.getElementById('featuredSection');
  if (posts.length > 0) {
    const f = posts[0];
    featuredEl.innerHTML = `
      <div class="section-title">오늘의 추천</div>
      <a href="${f.url}" class="featured" style="text-decoration:none;color:inherit;">
        <div class="featured-img">
          ${f.image
            ? `<img src="${f.image}" alt="${f.title}">`
            : `<div style="width:100%;height:100%;background:linear-gradient(135deg,#fce4ec,#ffccbc);display:flex;align-items:center;justify-content:center;font-size:3rem;">🛍️</div>`
          }
        </div>
        <div class="featured-content">
          <span class="post-badge">🔥 오늘의 추천</span>
          <h2>${f.title}</h2>
          <p>${f.summary || ''}</p>
          <span class="coupang-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            쿠팡에서 최저가 확인
          </span>
        </div>
      </a>
    `;
  } else {
    featuredEl.innerHTML = '';
  }

  // Grid (나머지)
  const grid = document.getElementById('postsGrid');
  const rest = posts.slice(1);
  if (rest.length === 0) {
    grid.innerHTML = '<div class="loading">게시물이 없습니다.</div>';
    return;
  }
  grid.innerHTML = rest.map(p => `
    <a href="${p.url}" class="post-card">
      ${p.image
        ? `<img class="card-img" src="${p.image}" alt="${p.title}">`
        : `<div class="card-img-placeholder">🛒</div>`
      }
      <div class="card-body">
        <div class="card-tags">
          ${(p.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('')}
        </div>
        <h3>${p.title}</h3>
        <p>${p.summary || ''}</p>
        <div class="card-meta">
          <span>${p.date || ''}</span>
          <span class="read-more">리뷰 보기 →</span>
        </div>
      </div>
    </a>
  `).join('');
}

function filterCategory(cat) {
  currentCategory = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  if (cat === '전체') {
    renderPosts(allPosts);
  } else {
    renderPosts(allPosts.filter(p => (p.tags||[]).some(t => t.includes(cat))));
  }
}

loadPosts();
</script>
</body>
</html>
